# LinuxCNC HMI simulation config
# Base behavior: sample simulator from LinuxCNC (LIB:basic_sim.tcl)
# Custom layer: load local HMI bridge HAL/Python component

[EMC]
VERSION = 1.1
MACHINE = HMI-SIM-XYZ
DEBUG = 0

[DISPLAY]
DISPLAY = axis
POSITION_OFFSET = RELATIVE
POSITION_FEEDBACK = ACTUAL
MAX_FEED_OVERRIDE = 1.2
MAX_SPINDLE_OVERRIDE = 1.0
MAX_LINEAR_VELOCITY = 1
DEFAULT_LINEAR_VELOCITY = 0.25
DEFAULT_SPINDLE_SPEED = 200
PROGRAM_PREFIX = /home/steve/devel/linuxcnc/configs/sim/nc_files/
INTRO_GRAPHIC = linuxcnc.gif
INTRO_TIME = 2
INCREMENTS = 1 in, 0.1 in, 10 mil, 1 mil, 1mm, 0.1mm

[TASK]
TASK = milltask
CYCLE_TIME = 0.001

[RS274NGC]
PARAMETER_FILE = hmi_sim.var

[EMCMOT]
EMCMOT = motmod
SERVO_PERIOD = 1000000

[EMCIO]
EMCIO = io
CYCLE_TIME = 0.100
TOOL_TABLE = /home/steve/devel/linuxcnc/configs/sim/sim.tbl

[HAL]
HALFILE = LIB:basic_sim.tcl
HALFILE = hmi_bridge.hal
HALFILE = hmi_wiring.hal
HALUI = halui

[TRAJ]
COORDINATES = XYZ
LINEAR_UNITS = inch
ANGULAR_UNITS = degree
MAX_LINEAR_VELOCITY = 1
DEFAULT_LINEAR_ACCELERATION = 100
MAX_LINEAR_ACCELERATION = 100

[KINS]
JOINTS = 3
KINEMATICS = trivkins coordinates=XYZ

[AXIS_X]
MAX_VELOCITY = 4
MAX_ACCELERATION = 100.0
MIN_LIMIT = -10.0
MAX_LIMIT = 10.0

[AXIS_Y]
MAX_VELOCITY = 4
MAX_ACCELERATION = 100.0
MIN_LIMIT = -10.0
MAX_LIMIT = 10.0

[AXIS_Z]
MAX_VELOCITY = 4
MAX_ACCELERATION = 100.0
MIN_LIMIT = -8.0
MAX_LIMIT = 0.12

[JOINT_0]
TYPE = LINEAR
HOME = 0.0
MAX_VELOCITY = 5
MAX_ACCELERATION = 50.0
MIN_LIMIT = -10.0
MAX_LIMIT = 10.0
HOME_SEQUENCE = 0
HOME_SEARCH_VEL = 20.0
HOME_LATCH_VEL = 20.0

[JOINT_1]
TYPE = LINEAR
HOME = 0.0
MAX_VELOCITY = 5
MAX_ACCELERATION = 50.0
MIN_LIMIT = -10.0
MAX_LIMIT = 10.0
HOME_SEQUENCE = 1
HOME_SEARCH_VEL = 20.0
HOME_LATCH_VEL = -20.0

[JOINT_2]
TYPE = LINEAR
HOME = 0.0
MAX_VELOCITY = 5
MAX_ACCELERATION = 50.0
MIN_LIMIT = -8.0
MAX_LIMIT = 0.12
HOME_SEQUENCE = 1
HOME_SEARCH_VEL = 20.0
HOME_LATCH_VEL = 20.0
