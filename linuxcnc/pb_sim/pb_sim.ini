# LinuxCNC Probe Basic (QtPyVCP) HMI simulation config
# 3-axis XYZ mill, inch units.
# Based on pb_required_ini_settings.ini from ~/dev/probe_basic/configs/probe_basic/
# trimmed to 3 joints and tuned to match the hmi_sim AXIS baseline.
#
# HMI bridge: same hmi.py + hmi_wiring.hal as hmi_sim.

[EMC]
VERSION = 1.1
MACHINE = HMI-PB-SIM-XYZ
DEBUG = 0

[DISPLAY]
DISPLAY = probe_basic
OPEN_FILE = ~/linuxcnc/nc_files/pb_examples/blank.ngc
CONFIRM_EXIT = False
LOG_FILE = pb_sim.log
LOG_LEVEL = WARNING
PREFERENCE_FILE = pb_sim.pref
CONFIG_FILE = custom_config.yml
POSITION_OFFSET = RELATIVE
POSITION_FEEDBACK = ACTUAL

MAX_FEED_OVERRIDE = 1.2
MAX_RAPID_OVERRIDE = 1.0
MAX_SPINDLE_OVERRIDE = 2.0
MIN_SPINDLE_OVERRIDE = 0.5
DEFAULT_SPINDLE_SPEED = 300

DEFAULT_LINEAR_VELOCITY = 0.25
MAX_LINEAR_VELOCITY = 1.0
MIN_LINEAR_VELOCITY = 0.01

PROGRAM_PREFIX = ~/linuxcnc/nc_files
INTRO_GRAPHIC = pbsplash.png
INTRO_TIME = 2
INCREMENTS = JOG .01in .001in .0001in

# 3-axis XYZ display
GEOMETRY = XYZ
DRO_DISPLAY = XYZ
OFFSET_COLUMNS = XYZR
TOOL_TABLE_COLUMNS = TZDR

# User customization paths
USER_BUTTONS_PATH = user_buttons/
USER_DROS_PATH = user_dro_display/
# USER_TABS_PATH = user_tabs/     # uncomment to add custom tabs
# USER_ATC_BUTTONS_PATH = user_atc_buttons/

# ATC tab: 0 = none
ATC_TAB_DISPLAY = 0

KEYBOARD_JOG = true
KEYBOARD_JOG_SAFETY_OFF = true

# HMI-specific override scale settings (read by hmi.py)
HMI_MAXVEL_CURVE = 3.0
HMI_MAXVEL_MIN = 0.02

HMI_SHUTTLE_SPEEDS = 0.5,1.0,2.0,5.0,10.0,25.0,60.0

[FILTER]
PROGRAM_EXTENSION = .nc,.txt,.tap Other NC files
PROGRAM_EXTENSION = .ngc G-Code File

[RS274NGC]
RS274NGC_STARTUP_CODE = F10 S300 G20 G17 G40 G49 G54 G64 P0.001 G80 G90 G91.1 G92.1 G94 G97 G98
PARAMETER_FILE = probe_basic.var
OWORD_NARGS = 1
NO_DOWNCASE_OWORD = 1
SUBROUTINE_PATH = subroutines
ON_ABORT_COMMAND = O<on_abort> CALL

[EMCMOT]
EMCMOT = motmod
COMM_TIMEOUT = 1.0
BASE_PERIOD = 100000
SERVO_PERIOD = 1000000

[TASK]
TASK = milltask
CYCLE_TIME = 0.010

[HAL]
# Standard Probe Basic 3-axis simulation HAL stack.
# hallib/ entries are symlinks into ~/dev/probe_basic/configs/probe_basic/hallib/
HALFILE = hallib/core_sim_3.hal
HALFILE = hallib/simulated_home_probe_basic_3.hal
HALFILE = hallib/spindle_sim.hal
# HMI bridge: loads hmi.py as a HAL userspace component
HALFILE = hmi_bridge.hal
# HMI jog/override wiring (also pre-loads pb-not for postgui cycle timer)
HALFILE = hmi_wiring.hal
HALUI = halui
# Probe Basic requires a post-GUI HAL for cycle timer and tool-change pins
POSTGUI_HALFILE = hallib/probe_basic_postgui.hal
TWOPASS = on

[HALUI]

[TRAJ]
AXES = 3
SPINDLES = 1
COORDINATES = X Y Z
LINEAR_UNITS = inch
ANGULAR_UNITS = degree
DEFAULT_LINEAR_VELOCITY = 0.25
MAX_LINEAR_VELOCITY = 1.0
DEFAULT_LINEAR_ACCELERATION = 100
MAX_LINEAR_ACCELERATION = 100

[EMCIO]
EMCIO = io
CYCLE_TIME = 0.100
TOOL_TABLE = tool.tbl

[KINS]
JOINTS = 3
KINEMATICS = trivkins coordinates=XYZ

#==================
#      X Axis
#==================
[AXIS_X]
MAX_VELOCITY = 4.0
MAX_ACCELERATION = 100.0
MIN_LIMIT = -10.0
MAX_LIMIT = 10.0

[JOINT_0]
TYPE = LINEAR
HOME = 0.0
MAX_VELOCITY = 5.0
MAX_ACCELERATION = 50.0
MIN_LIMIT = -10.0
MAX_LIMIT = 10.0
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = 3.0
HOME_LATCH_VEL = 0.2
HOME_USE_INDEX = NO
HOME_IGNORE_LIMITS = NO
HOME_SEQUENCE = 1

#==================
#      Y Axis
#==================
[AXIS_Y]
MAX_VELOCITY = 4.0
MAX_ACCELERATION = 100.0
MIN_LIMIT = -10.0
MAX_LIMIT = 10.0

[JOINT_1]
TYPE = LINEAR
HOME = 0.0
MAX_VELOCITY = 5.0
MAX_ACCELERATION = 50.0
MIN_LIMIT = -10.0
MAX_LIMIT = 10.0
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = 3.0
HOME_LATCH_VEL = 0.2
HOME_USE_INDEX = NO
HOME_IGNORE_LIMITS = NO
HOME_SEQUENCE = 1

#==================
#      Z Axis
#==================
[AXIS_Z]
MAX_VELOCITY = 4.0
MAX_ACCELERATION = 100.0
MIN_LIMIT = -8.0
MAX_LIMIT = 0.12

[JOINT_2]
TYPE = LINEAR
HOME = 0.0
MAX_VELOCITY = 5.0
MAX_ACCELERATION = 50.0
MIN_LIMIT = -8.0
MAX_LIMIT = 0.12
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = 3.0
HOME_LATCH_VEL = 0.2
HOME_USE_INDEX = NO
HOME_IGNORE_LIMITS = NO
HOME_SEQUENCE = 0

#==================
#     Spindle
#==================
[SPINDLE_9]
P = 0
I = 0
D = 0
FF0 = 1
FF1 = 0
FF2 = 0
BIAS = 0
DEADBAND = 0
MAX_OUTPUT = 2000
